<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <path id="topArc" d="M 156,256 A 100,100 0 0,1 356,256" fill="none"/>
    <path id="bottomArc" d="M 156,256 A 100,100 0 0,0 356,256" fill="none"/>
  </defs>

  <!-- Outer navy ring -->
  <circle cx="256" cy="256" r="160" fill="#002D72"/>
  <!-- Gold inner accent ring -->
  <circle cx="256" cy="256" r="152" fill="#C5A028"/>
  <!-- Inner white circle -->
  <circle cx="256" cy="256" r="148" fill="#FFFFFF"/>
  <!-- Additional thin gold accent ring -->
  <circle cx="256" cy="256" r="144" fill="none" stroke="#C5A028" stroke-width="1"/>

  <!-- Top text: WINE (arched) - W in RED, INE in GOLD -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#C41E3A" text-anchor="middle" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" textLength="160" lengthAdjust="spacing">W</textPath>
  </text>
  <text font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#C5A028" text-anchor="middle" letter-spacing="2">
    <textPath href="#topArc" startOffset="62%" textLength="160" lengthAdjust="spacing">INE</textPath>
  </text>

  <!-- Bottom text: GLOBAL WINE DATABASE (arched) -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#C5A028" text-anchor="middle" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%">GLOBAL WINE DATABASE</textPath>
  </text>

  <!-- Gold divider line -->
  <line x1="210" y1="245" x2="302" y2="245" stroke="#C5A028" stroke-width="2"/>

  <!-- Teal 24 center -->
  <text x="256" y="310" font-family="'Georgia', 'Times New Roman', 'Didot', serif" font-size="64" font-weight="bold" fill="#0097B2" text-anchor="middle">24</text>
</svg>
