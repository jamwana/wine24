<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#C5A028"/>
      <stop offset="100%" stop-color="#B8960F"/>
    </linearGradient>
  </defs>

  <!-- Compass Point: TOP (Navy) -->
  <polygon points="256,50 220,210 256,256 292,210" fill="#002D72"/>

  <!-- Compass Point: RIGHT (Navy) -->
  <polygon points="462,256 302,220 256,256 302,292" fill="#002D72"/>

  <!-- Compass Point: BOTTOM (Teal) -->
  <polygon points="256,462 220,302 256,256 292,302" fill="#0097B2"/>

  <!-- Compass Point: LEFT (Teal) -->
  <polygon points="50,256 210,220 256,256 210,292" fill="#0097B2"/>

  <!-- Center Gold Medallion -->
  <circle cx="256" cy="256" r="38" fill="url(#goldGrad)"/>

  <!-- "24" inside medallion -->
  <text x="256" y="270" font-family="'Georgia', 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">24</text>

  <!-- "WINE" text below compass -->
  <text x="256" y="380" font-family="'Georgia', 'Didot', 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#002D72" text-anchor="middle" letter-spacing="8">WINE</text>

  <!-- Subtitle: GLOBAL WINE DATABASE -->
  <text x="256" y="420" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#C5A028" text-anchor="middle" letter-spacing="4">GLOBAL WINE DATABASE</text>
</svg>
